baseurl: ""
permalink: pretty
title: 'Do IT Best'
description: 'Mosty w IT od 2014 roku. Fundacja i społeczność profesjonalistów IT w Gdańsku.'
url: "https://doITbest-ngo.github.io"
repository: doITbest-ngo/doITbest-ngo.github.io
remote_theme: zerostaticthemes/jekyll-serif-theme

logo:
  mobile: "images/logo/logo-mobile.svg"
  mobile_height: "32px"
  mobile_width: "32px"
  desktop: "images/logo/logo.svg"
  desktop_height: "32px"
  desktop_width: "120px"

home:
  limit_services: 6

collections:
  services:
    output: true
    sort_by: weight
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"

sass:
  style: compressed

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - docs/
  - README.md
