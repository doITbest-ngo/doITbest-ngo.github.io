<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#35bdc8;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#35bdc8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <!-- Background blobs -->
  <circle cx="100" cy="100" r="70" fill="url(#grad1)"/>
  <circle cx="300" cy="300" r="90" fill="url(#grad1)"/>
  <!-- Network lines -->
  <line x1="100" y1="100" x2="200" y2="170" stroke="#2563eb" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="200" y1="170" x2="300" y2="300" stroke="#35bdc8" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="100" y1="100" x2="310" y2="120" stroke="#2563eb" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="200" y1="170" x2="310" y2="120" stroke="#35bdc8" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="200" y1="170" x2="130" y2="290" stroke="#2563eb" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="130" y1="290" x2="300" y2="300" stroke="#35bdc8" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="310" y1="120" x2="300" y2="300" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Main nodes -->
  <circle cx="100" cy="100" r="10" fill="#2563eb"/>
  <circle cx="200" cy="170" r="12" fill="url(#grad2)"/>
  <circle cx="300" cy="300" r="10" fill="#35bdc8"/>
  <!-- Amber node — prominent -->
  <circle cx="310" cy="120" r="14" fill="url(#amber)"/>
  <circle cx="130" cy="290" r="7" fill="#2563eb" fill-opacity="0.5"/>
  <!-- Small accent dots -->
  <circle cx="160" cy="230" r="4" fill="#35bdc8" fill-opacity="0.5"/>
  <circle cx="250" cy="240" r="4" fill="#2563eb" fill-opacity="0.4"/>
  <circle cx="180" cy="60" r="3" fill="#f59e0b" fill-opacity="0.5"/>
  <circle cx="350" cy="210" r="3" fill="#35bdc8" fill-opacity="0.4"/>
  <circle cx="60" cy="200" r="3" fill="#f59e0b" fill-opacity="0.35"/>
</svg>
