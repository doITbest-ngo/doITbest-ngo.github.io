<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#35bdc8;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#35bdc8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circles -->
  <circle cx="80" cy="80" r="60" fill="url(#grad1)"/>
  <circle cx="320" cy="320" r="80" fill="url(#grad1)"/>
  <circle cx="300" cy="100" r="40" fill="#f59e0b" fill-opacity="0.1"/>
  <!-- Network lines -->
  <line x1="80" y1="80" x2="200" y2="150" stroke="#2563eb" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="200" y1="150" x2="320" y2="320" stroke="#35bdc8" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="300" y2="100" stroke="#2563eb" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="150" x2="300" y2="100" stroke="#35bdc8" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="150" x2="120" y2="300" stroke="#2563eb" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="120" y1="300" x2="320" y2="320" stroke="#35bdc8" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Nodes -->
  <circle cx="80" cy="80" r="8" fill="#2563eb"/>
  <circle cx="200" cy="150" r="10" fill="url(#grad2)"/>
  <circle cx="320" cy="320" r="8" fill="#35bdc8"/>
  <circle cx="300" cy="100" r="6" fill="#f59e0b"/>
  <circle cx="120" cy="300" r="6" fill="#2563eb" fill-opacity="0.6"/>
  <!-- Small dots -->
  <circle cx="150" cy="200" r="3" fill="#35bdc8" fill-opacity="0.5"/>
  <circle cx="250" cy="250" r="3" fill="#2563eb" fill-opacity="0.5"/>
  <circle cx="180" cy="50" r="2" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="350" cy="200" r="2" fill="#35bdc8" fill-opacity="0.4"/>
</svg>
